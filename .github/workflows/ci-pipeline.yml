name: "Terraform Continuous Deployment (CD) Capstone"

on:
  push:
    branches:
      - main

jobs:
  terraform_pipeline:
    name: "Execute Capstone Deployment Pipeline"
    runs-on: ubuntu-latest

    # Inject your encrypted AWS credentials into the entire virtual machine environment
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout Code Baseline
        uses: actions/checkout@v4

      - name: Install Terraform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Run Style Sheet Linter
        run: terraform fmt -check -recursive

      # Initialize and Validate the Week 16 Master Bank Architecture
      - name: Initialize Bank Architecture Core
        run: |
          cd terraform-labs/week16
          terraform init -backend=false

      - name: Validate Bank Architecture Syntax
        run: |
          cd terraform-labs/week16
          terraform validate

      # THE GRADUATION CD GATE: Automatically Provision the Infrastructure to AWS!
      - name: Execute Automated Cloud Deployment
        run: |
          cd terraform-labs/week16
          terraform init -force-copy
          terraform destroy -auto-approve \
            -var="aws_region=eu-central-1" \
            -var="instance_type=t3.micro" \
            -var="env_tag=Automated-Prod"
